name: 大盘复盘推送

on:
  schedule:
    # A股收盘后 15:30 触发（UTC+8 = UTC 07:30）
    # 周一到周五运行，节假日由代码内部的交易日判断处理
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  market-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market review
        env:
          # 飞书
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          # LLM（my_market_review 不使用，但主程序初始化需要）
          LLM_CHANNELS: ${{ secrets.LLM_CHANNELS }}
          LLM_ZHIPU_API_KEY: ${{ secrets.LLM_ZHIPU_API_KEY }}
          LLM_ZHIPU_BASE_URL: ${{ secrets.LLM_ZHIPU_BASE_URL }}
          LLM_ZHIPU_MODELS: ${{ secrets.LLM_ZHIPU_MODELS }}
          LLM_ZHIPU_PROTOCOL: openai
          LITELLM_MODEL: openai/glm-4-flash
          # 运行配置
          RUN_IMMEDIATELY: "true"
          SCHEDULE_ENABLED: "false"
          MARKET_REVIEW_ENABLED: "true"
          TRADING_DAY_CHECK_ENABLED: "false"
          REPORT_TYPE: simple
          LOG_LEVEL: INFO
          LOG_DIR: ./logs
          MAX_WORKERS: "3"
          DATABASE_PATH: ./data/stock_analysis.db
          STOCK_LIST: "600519,000858,300750"
        run: python main.py --market-review --no-notify=false
